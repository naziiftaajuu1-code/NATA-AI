<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
  // 2️⃣ Firebase Configuration (Furtuu Keeti fi URL Kuusaa Dataa Keetii)
  const firebaseConfig = {
    apiKey: "AIzaSyBW-blZmYanrKeo4QNxI3We7QZUxwFOqhs",
    authDomain: "nata-ai-50e91.firebaseapp.com",
    databaseURL: "https://nata-ai-50e91-default-rtdb.firebaseio.com/",
    projectId: "nata-ai-50e91",
    storageBucket: "nata-ai-50e91.firebasestorage.app",
    messagingSenderId: "236263948485",
    appId: "1:236263948485:web:b395c62a9dcd499ec330ac",
    measurementId: "G-TM1J5S0NXT"
  };

  // Firebase Initialize Gochuu
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  let currentUserRef = null;
  let userCoins = 0;

  // 3️⃣ Sirna Login Icciitii (Anonymous Auth) fi Hordoffii Coin
  auth.onAuthStateChanged((user) => {
    if (user) {
      // User yoo bame, kuusaa dataa isaa hordofi
      currentUserRef = database.ref('users/' + user.uid);
      currentUserRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          userCoins = data.coins;
        } else {
          // User haaraa yoo ta'e badhaasa 100 Coins kenniif
          userCoins = 100;
          currentUserRef.set({ coins: userCoins });
        }
        // UI irratti lakkoofsa Coin agarsiisi
        document.getElementById('response').innerHTML = `Akkam jirtu! NATA AI qophaa'eera. Lakkoofsa Coin keessan: 🪙 ${userCoins}`;
      });
    } else {
      // Osoo Login hin godhin yoo seene kallaattiidhaan galmeessi
      auth.signInAnonymously().catch((error) => {
        console.error("Gantiin uumameera: ", error.message);
      });
    }
  });

  // 4️⃣ Gaaffii AI Erguu fi Coin Hir'isuu
  function sendRequest() {
    const model = document.getElementById('ai-model').value;
    const prompt = document.getElementById('prompt').value;
    const responseBox = document.getElementById('response');

    if (!prompt.trim()) {
      responseBox.innerHTML = "Maaloo dura gaaffii keessan saanduqa gubbaa irratti barreessaa...";
      return;
    }

    if (userCoins <= 0) {
      responseBox.innerHTML = "⚠️ Lakkoofsa Coin keessan dhumateera! Maaloo Telebirr/M-Pesa fayyadamuun guuttadhadha.";
      return;
    }

    responseBox.innerHTML = "🔄 NATA AI yaadaa jira... (Backend Dubbisaa Jira)";

    // Ammaaf backend koodii uumun dura Coin 1 hir'isnee haa laallu
    userCoins -= 1;
    currentUserRef.update({ coins: userCoins }).then(() => {
      // Iddoo kanatti kutaalee AI (Gemini/ChatGPT/Claude) backend itti aanuun hidhna
      setTimeout(() => {
        responseBox.innerHTML = `🤖 [${model}]: Kun deebii yaalii kuusaa dataati. Prompt kee: "${prompt}". Coin hafe: 🪙 ${userCoins}`;
      }, 1500);
    }).catch((error) => {
      responseBox.innerHTML = "Gantiin kuusaa dataa uumameera: " + error.message;
    });
  }
</script>
